name: Generate Calendar

on:
  schedule:
    - cron: '0 8 * * *'  # runs daily at 8am UTC (1am Pacific)
  workflow_dispatch:       # allows manual trigger from GitHub UI
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests icalendar pytz

      - name: Run calendar script
        env:
          VC_CLIENT_ID: ${{ secrets.VC_CLIENT_ID }}
          VC_CLIENT_SECRET: ${{ secrets.VC_CLIENT_SECRET }}
          VC_SCHOOL_ROUTE: ${{ secrets.VC_SCHOOL_ROUTE }}
        run: python calendarpython.py

      - name: Commit and push .ics file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add headroyce_combined.ics
          git diff --staged --quiet || git commit -m "Update calendar"
          git push
